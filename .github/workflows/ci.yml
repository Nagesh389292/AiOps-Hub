name: aiops-hub-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Smoke benchmark run
        env:
          AIOPS_RUNTIME_MODE: mock
        run: |
          python - <<'PY'
          from database.db import init_db
          from engines.benchmark_engine import BenchmarkEngine

          init_db()
          engine = BenchmarkEngine()
          result = engine.run(category='coding', selected_models=['gpt', 'claude', 'gemini'], daily_requests=1000)
          assert result['leaderboard'], 'Expected leaderboard output'
          assert result['recommendation']['best_overall_model'], 'Expected recommendation output'
          print('Smoke benchmark completed')
          PY
